name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # push the coverage badge to the `badges` branch (main only)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -coverprofile=cover.out ./...

      # On main: write the badge to the pre-created `badges` orphan branch.
      # Elsewhere: git-token is empty, so this only reports coverage — no push, no gate.
      # Docker action (prebuilt image) — avoids compiling the tool, which needs a
      # newer Go than this module's go.mod pins.
      - name: Coverage badge
        uses: vladopajic/go-test-coverage@v2
        with:
          profile: cover.out
          git-token: ${{ github.ref_name == 'main' && secrets.GITHUB_TOKEN || '' }}
          git-branch: badges
